services:
  postgres:
    image: postgres:16
    container_name: kbo-postgres
    environment:
      POSTGRES_DB: kbo_baseball
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

